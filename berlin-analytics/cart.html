<!DOCTYPE html>
<html>
<head>
    <title>Berlin Analytics - Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>BERLIN ANALYTICS</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </nav>
    </header>
    <main>
        <section class="cart">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items">
                <!-- Cart items will be loaded here by JavaScript -->
            </div>
            <div id="cart-total">
                <!-- Cart total will be loaded here by JavaScript -->
            </div>
            <button id="checkout-button" onclick="checkout()">Proceed to Checkout</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Berlin Analytics. All rights reserved.</p>
    </footer>
    <script src="js/script.js"></script>
    <script>
        // Display cart items
        function displayCart() {
            const cartItemsElement = document.getElementById("cart-items");
            const cartTotalElement = document.getElementById("cart-total");
            
            if (cartItemsElement && cartTotalElement) {
                if (cart.length === 0) {
                    cartItemsElement.innerHTML = "<p>Your cart is empty.</p>";
                    cartTotalElement.innerHTML = "";
                    return;
                }
                
                let cartHTML = "<div class=\"product-grid\">";
                let total = 0;
                
                cart.forEach((product, index) => {
                    cartHTML += `
                        <div class=\"product-card\">
                            <h4>${product.name}</h4>
                            <p>$${product.price.toFixed(2)}</p>
                            <button onclick=\"removeFromCart(${index})\">Remove</button>
                        </div>
                    `;
                    total += product.price;
                });
                
                cartHTML += "</div>";
                cartItemsElement.innerHTML = cartHTML;
                cartTotalElement.innerHTML = `<h3>Total: $${total.toFixed(2)}</h3>`;
            }
        }
        
        // Remove item from cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            displayCart();
        }
        
        // Simulate checkout
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            
            alert("Thank you for your order! This is a simulation.");
            cart = [];
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartCount();
            displayCart();
        }
        
        // Initialize page
        document.addEventListener("DOMContentLoaded", function() {
            updateCartCount();
            displayCart();
        });
    </script>
</body>
</html>
